function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

function getHolidayReason(dateStr){const h=holidays.find(h=>{const f=h.dateFrom||h.date,t=h.dateTo||h.date;return dateStr>=f&&dateStr<=t});return h?h.reason:"Holiday"}

function renderMd(text){
  if(!text)return"";
  try{
    if(typeof marked!=="undefined"){
      marked.setOptions({breaks:true,gfm:true});
      return marked.parse(text);
    }
  }catch(e){}
  return text
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n/g,'<br>');
}

app.innerHTML=`<div style="padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between" class="fade-in"><div><p style="font-size:12px;color:var(--muted-fg)">Welcome back,</p><h1 style="font-size:22px;font-weight:700">${name} ${admin?"👑":"👋"}</h1>${admin?`<span style="font-size:10px;color:var(--primary);font-weight:600;display:flex;align-items:center;gap:4px;margin-top:2px">${icons.shield} Admin</span>`:""}</div><div style="display:flex;gap:8px"><button id="profileBtn" class="glass-l" style="padding:10px;border-radius:14px;cursor:pointer;color:var(--muted-fg);background:none">${icons.user}</button><button id="logoutBtn" class="glass-l" style="padding:10px;border-radius:14px;cursor:pointer;color:var(--muted-fg);background:none">${icons.logout}</button></div></div><div id="alertBanner" style="padding:0 20px 8px"></div><div id="periodTracker" style="padding:0 20px 8px"></div><div id="statsArea" style="padding:0 20px 12px"></div><div id="content" style="flex:1;padding:0 20px 96px;overflow-y:auto"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:50"><div style="max-width:480px;margin:0 auto;padding:0 16px 16px"><div id="tabBar" class="glass no-scroll" style="display:flex;align-items:center;justify-content:space-around;overflow-x:auto;padding:6px;gap:2px"></div></div></div>`;
document.getElementById("logoutBtn").onclick=()=>auth.signOut();
document.getElementById("profileBtn").onclick=()=>{activeTab="profile";activeSubTab="";renderTabs();renderContent()};
renderTabs();renderStats();renderAlertBanner();renderPeriodTracker();renderContent()}

const TAB_CONFIG=[
  {k:"classroom",l:"Class",i:icons.users,subs:[{k:"students",l:"Students"},{k:"attendance",l:"Attendance"},{k:"attReport",l:"Att. Report"},{k:"picker",l:"Picker"}]},
  {k:"academics",l:"Academics",i:icons.book,subs:[{k:"marks",l:"Marks"},{k:"reports",l:"Reports"},{k:"qpaper",l:"Q-Paper"}]},
  {k:"schedule",l:"Schedule",i:icons.cal,subs:[{k:"timetable",l:"Timetable"},{k:"alerts",l:"Alerts"},{k:"holidays",l:"Holidays"}]},
  {k:"chat",l:"Chat",i:icons.chat,subs:[]},
  {k:"nexus",l:"Nexus",i:icons.bot,subs:[]}
];

function renderTabs(){
const bar=document.getElementById("tabBar");if(!bar)return;
bar.innerHTML=TAB_CONFIG.map(t=>`<button data-tab="${t.k}" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 12px;border-radius:14px;border:none;cursor:pointer;flex-shrink:0;font-size:11px;font-weight:600;background:none;transition:all .2s;font-family:'Rajdhani',sans-serif;${activeTab===t.k?"":"color:var(--muted-fg)"}" class="${activeTab===t.k?"tab-act":""}">${t.i}<span>${t.l}</span></button>`).join("");
bar.querySelectorAll("button").forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;const cfg=TAB_CONFIG.find(t=>t.k===activeTab);if(cfg&&cfg.subs.length)activeSubTab=cfg.subs[0].k;else activeSubTab="";renderTabs();renderContent()})}

function renderSubTabs(){
const cfg=TAB_CONFIG.find(t=>t.k===activeTab);
if(!cfg||!cfg.subs.length)return"";
return`<div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto" class="no-scroll">${cfg.subs.map(s=>`<button data-sub="${s.k}" class="sub-tab ${activeSubTab===s.k?"sub-tab-act":"glass-l"}" style="white-space:nowrap">${s.l}</button>`).join("")}</div>`;
}

function bindSubTabs(el){
el.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>{activeSubTab=b.dataset.sub;renderContent()})
}

function renderStats(){const el=document.getElementById("statsArea");if(!el)return;const ct=userProfile.classTeacherOf;const my=ct&&ct!=="None"?getStudentsForClass(ct):[];const tot=my.length;const pres=my.filter(s=>{const a=s.attendance||{};return a[todayStr()]==="Present"}).length;
el.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" class="fade-in">${[{l:"My Students",v:tot,c:"var(--primary)"},{l:"Present Today",v:pres,c:"var(--success)"}].map(s=>`<div class="glass-l" style="padding:14px;text-align:center"><p style="font-size:22px;font-weight:700;color:${s.c}">${s.v}</p><p style="font-size:11px;color:var(--muted-fg);font-weight:500">${s.l}</p></div>`).join("")}</div>`}

function renderAlertBanner(){const el=document.getElementById("alertBanner");if(!el)return;let b=[];const td=todayStr();
holidays.forEach(h=>{
  const from=h.dateFrom||h.date,to=h.dateTo||h.date;
  if(td>=from&&td<=to)b.push({title:"🎉 Holiday: "+(h.reason||"Holiday")+(from===to?"":" ("+fmtDateShort(from)+" - "+fmtDateShort(to)+")"),type:"holiday"});
  else if(from>td){const d=Math.ceil((new Date(from)-Date.now())/864e5);if(d<=7)b.push({title:"Holiday "+fmtDateShort(from)+(from!==to?" to "+fmtDateShort(to):"")+": "+h.reason,type:"upcoming"})}
});
exams.forEach(e=>{const d=Math.ceil((new Date(e.date)-Date.now())/864e5);if(d===0)b.push({title:e.subject+" Exam Today!",type:"urgent"});else if(d>0&&d<=7)b.push({title:e.subject+" exam in "+d+"d",type:"upcoming"})});
alerts.filter(a=>a.type==="urgent").forEach(a=>b.unshift({title:a.title,type:"urgent"}));
if(!b.length){el.innerHTML="";return}
el.innerHTML=b.slice(0,3).map(x=>{if(x.type==="holiday")return`<div class="holiday-banner"><span style="font-size:18px">🏖️</span><p style="flex:1;font-size:13px;font-weight:600">${x.title}</p></div>`;return`<div class="${x.type==="urgent"?"alert-u":"alert-up"}" style="padding:10px;display:flex;align-items:center;gap:8px;margin-bottom:6px">${x.type==="urgent"?`<span style="color:var(--destructive)">${icons.warn}</span>`:`<span style="color:var(--warning)">${icons.cal}</span>`}<p style="flex:1;font-size:13px;font-weight:500">${x.title}</p></div>`}).join("")}

function renderPeriodTracker(){const el=document.getElementById("periodTracker");if(!el)return;const now=new Date(),dN=DAYS[now.getDay()-1],nM=now.getHours()*60+now.getMinutes();
const td=todayStr();
if(holidays.some(h=>{const f=h.dateFrom||h.date,t=h.dateTo||h.date;return td>=f&&td<=t})){el.innerHTML=`<div class="glass-l" style="padding:16px;text-align:center"><p style="font-size:15px;color:var(--warning)">🎉 Holiday today!</p></div>`;return}
if(!dN){el.innerHTML=`<div class="glass-l" style="padding:16px;text-align:center"><p style="font-size:15px;color:var(--muted-fg)">🎉 Weekend!</p></div>`;return}
if(nM>=toMin("14:40")){el.innerHTML=`<div class="glass-l" style="padding:16px;text-align:center"><p style="font-size:15px;color:var(--muted-fg)">🏠 School day over!</p></div>`;return}
if(nM<toMin("08:30")){el.innerHTML=`<div class="glass-l" style="padding:16px;display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:14px;background:hsla(190,90%,50%,.15);display:flex;align-items:center;justify-content:center"><span style="color:var(--primary)">${icons.clock}</span></div><div><p style="font-size:12px;color:var(--muted-fg)">School starts in</p><p style="font-size:15px;font-weight:700">${fmtMin(toMin("08:30")-nM)}</p></div></div>`;return}
const ci=SCHEDULE.findIndex(s=>nM>=toMin(s.start)&&nM<toMin(s.end));const cur=ci>=0?SCHEDULE[ci]:null;if(!cur){el.innerHTML="";return}
const tl=toMin(cur.end)-nM,prog=((toMin(cur.end)-toMin(cur.start)-tl)/(toMin(cur.end)-toMin(cur.start)))*100;
const tSubs={};timetable.filter(e=>e.day===dN).forEach(e=>{tSubs[e.period]=e});
const pn=getPNum(cur.label),curE=pn?tSubs[pn]:null,curSubj=curE?curE.subject:null;
const clr=cur.type==="break"?"var(--warning)":cur.type==="assembly"?"var(--accent)":"var(--primary)";
el.innerHTML=`<div class="glass-l" style="padding:16px"><div style="display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:14px;background:${cur.type==="break"?"hsla(38,92%,50%,.15)":cur.type==="assembly"?"hsla(280,70%,60%,.15)":"hsla(190,90%,50%,.15)"};display:flex;align-items:center;justify-content:center"><span style="color:${clr}">${icons.clock}</span></div><div style="flex:1"><p style="font-size:12px;color:var(--muted-fg)">Now</p><p style="font-size:15px;font-weight:700">${curSubj||cur.label}</p>${curE?`<p style="font-size:11px;color:var(--muted-fg)">${cur.label} · ${curE.className}</p>`:""}</div><div style="text-align:right"><p style="font-size:20px;font-weight:700">${fmtMin(tl)}</p><p style="font-size:10px;color:var(--muted-fg)">left</p></div></div><div style="margin-top:12px;height:6px;border-radius:3px;background:var(--muted);overflow:hidden"><div style="height:100%;border-radius:3px;background:${clr};width:${prog}%;transition:width .5s"></div></div></div>`}
setInterval(()=>{if(currentUser)renderPeriodTracker()},15000);

function renderContent(){const el=document.getElementById("content");if(!el)return;el.innerHTML="";
if(activeTab==="profile"){renderProfile(el);return}
if(activeTab==="classroom"){
  if(activeSubTab==="students")renderStudents(el);
  else if(activeSubTab==="attendance")renderAttendance(el);
  else if(activeSubTab==="attReport")renderAttReport(el);
  else if(activeSubTab==="picker")renderPicker(el);
  else{activeSubTab="students";renderStudents(el)}
}else if(activeTab==="academics"){
  if(activeSubTab==="marks")renderMarks(el);
  else if(activeSubTab==="reports")renderReports(el);
  else if(activeSubTab==="qpaper")renderQPaper(el);
  else{activeSubTab="marks";renderMarks(el)}
}else if(activeTab==="schedule"){
  if(activeSubTab==="timetable")renderTimetable(el);
  else if(activeSubTab==="alerts")renderAlerts(el);
  else if(activeSubTab==="holidays")renderHolidays(el);
  else{activeSubTab="timetable";renderTimetable(el)}
}else if(activeTab==="chat"){renderChat(el)}
else if(activeTab==="nexus"){renderAI(el)}
}

function renderProfile(el){const uid=currentUser.uid,admin=isAdmin(currentUser.email),p=userProfile;
let h=`<div class="fade-in"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Profile</h2><div class="glass-l" style="padding:16px;margin-bottom:16px"><p style="font-size:12px;color:var(--muted-fg);margin-bottom:4px">Email</p><p style="font-size:14px;font-weight:500;margin-bottom:12px">${currentUser.email||"N/A"}</p><p style="font-size:12px;color:var(--muted-fg);margin-bottom:4px">Name</p><input id="profName" value="${p.displayName||currentUser.displayName||""}" placeholder="Your name" style="width:100%;margin-bottom:12px"/><p style="font-size:12px;color:var(--muted-fg);margin-bottom:4px">Subject</p><input id="profSubject" value="${p.subject||""}" placeholder="e.g. Mathematics" style="width:100%;margin-bottom:12px"/><p style="font-size:12px;color:var(--muted-fg);margin-bottom:4px">Class Teacher Of <span style="color:var(--destructive)">*</span></p><select id="profCT" style="width:100%;margin-bottom:16px">${getClassTeacherOptions().map(c=>`<option value="${c}" ${p.classTeacherOf===c?"selected":""}>${c}</option>`).join("")}</select><button id="saveProf" class="btn" style="width:100%;padding:12px;font-size:15px">Save Profile</button></div>`;
h+=`<div class="glass-l" style="padding:16px;margin-bottom:16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:12px">🎨 Appearance</h3><p style="font-size:12px;color:var(--muted-fg);margin-bottom:8px">Theme</p><div style="display:flex;gap:8px;margin-bottom:16px">${["auto","light","dark"].map(t=>`<button data-theme="${t}" style="flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:12px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;text-transform:capitalize;${themeMode===t?"background:linear-gradient(135deg,hsl(190,90%,50%),hsl(200,90%,45%));color:var(--primary-fg)":"background:hsla(230,30%,20%,.3);color:var(--muted-fg)"}">${t==="auto"?"🔄 Auto":t==="light"?"☀️ Light":"🌙 Dark"}</button>`).join("")}</div>`;
h+=`<p style="font-size:12px;color:var(--muted-fg);margin-bottom:8px">Notifications</p><div style="display:flex;align-items:center;justify-content:space-between"><p style="font-size:14px;font-weight:500">Push Notifications</p><button id="notifToggle" class="btn${notifPermission==="granted"?"":"-g"}" style="padding:8px 16px;font-size:13px;border-radius:12px">${notifPermission==="granted"?"✅ Enabled":"🔔 Enable"}</button></div><p style="font-size:11px;color:var(--muted-fg);margin-top:4px">Get alerts for exams & announcements</p></div>`;
if(admin){h+=`<div class="glass-l" style="padding:16px;margin-bottom:16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Add Custom Class</h3><div style="display:flex;gap:8px;margin-bottom:12px"><input id="ccName" placeholder="e.g. Library, PE" style="flex:1"/><button id="addCC" class="btn" style="padding:8px 16px">Add</button></div>${customClasses.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${customClasses.map(c=>`<span style="font-size:12px;background:hsla(260,60%,55%,.15);color:var(--secondary);padding:4px 10px;border-radius:8px">${c}<button data-rmcc="${c}" style="background:none;border:none;color:var(--muted-fg);cursor:pointer;margin-left:4px;font-size:10px;font-family:'Rajdhani',sans-serif">✕</button></span>`).join("")}</div>`:""}</div>`;
h+=`<div class="glass-l" style="padding:16px;margin-bottom:16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Mark Holiday</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><label style="font-size:10px;color:var(--muted-fg)">From Date</label><input id="holFrom" type="date" style="width:100%"/></div><div><label style="font-size:10px;color:var(--muted-fg)">To Date</label><input id="holTo" type="date" style="width:100%"/></div></div><input id="holReason" placeholder="Reason" style="width:100%;margin-bottom:8px"/><button id="addHol" class="btn" style="width:100%;padding:10px;font-size:14px">Add Holiday & Notify All</button></div>`}
h+="</div>";el.innerHTML=h;
el.querySelectorAll("[data-theme]").forEach(b=>b.onclick=()=>{themeMode=b.dataset.theme;localStorage.setItem("tm_theme",themeMode);applyTheme();renderProfile(el)});
document.getElementById("notifToggle").onclick=()=>{requestNotifPermission();setTimeout(()=>renderProfile(el),500)};
document.getElementById("saveProf").onclick=()=>{const prof={displayName:document.getElementById("profName").value.trim(),subject:document.getElementById("profSubject").value.trim(),classTeacherOf:document.getElementById("profCT").value,email:currentUser.email};db.ref("users/"+uid+"/profile").set(prof);userProfile=prof;alert("Saved!");renderStats();renderContent()};
if(admin){document.getElementById("addCC").onclick=()=>{const n=document.getElementById("ccName").value.trim();if(!n)return;db.ref("customClasses/"+Date.now()).set({id:Date.now().toString(),name:n});document.getElementById("ccName").value=""};
el.querySelectorAll("[data-rmcc]").forEach(b=>b.onclick=()=>{db.ref("customClasses").once("value",s=>{const d=s.val()||{};Object.keys(d).forEach(k=>{if(d[k].name===b.dataset.rmcc)db.ref("customClasses/"+k).remove()})})});

let studentSubTab="period";
function renderStudents(el){const ct=userProfile.classTeacherOf,isCT=ct&&ct!=="None";
let h=`<div class="fade-in"><h2 style="font-size:20px;font-weight:700;margin-bottom:12px">Students</h2>${renderSubTabs()}<div style="display:flex;gap:8px;margin-bottom:16px"><button data-stab="period" class="sub-tab ${studentSubTab==="period"?"sub-tab-act":"glass-l"}" style="flex:1">Period</button><button data-stab="class" class="sub-tab ${studentSubTab==="class"?"sub-tab-act":"glass-l"}" style="flex:1">My Class</button></div>`;
if(studentSubTab==="period"){const cc=getCurrentPeriodClass();if(!cc)h+=`<div style="text-align:center;padding:48px 0;color:var(--muted-fg);font-size:14px">No active period right now.</div>`;else{const stu=getStudentsForClass(cc);h+=`<p style="font-size:14px;font-weight:600;color:var(--primary);margin-bottom:12px">Current: ${cc}</p>`;if(!stu.length)h+=`<p style="text-align:center;color:var(--muted-fg);padding:32px 0">No students in ${cc}</p>`;else h+=stu.map(s=>`<div class="glass-l" style="padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px"><div style="width:36px;height:36px;border-radius:12px;background:hsla(190,90%,50%,.12);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);font-size:12px">${s.roll_no||"#"}</div><div style="flex:1"><p style="font-size:14px;font-weight:600">${s.name}</p><p style="font-size:11px;color:var(--muted-fg)">Att: ${getAttendancePct(s).toFixed(0)}%</p></div></div>`).join("")}
}else{if(!isCT)h+=`<div style="text-align:center;padding:48px 0;color:var(--muted-fg);font-size:14px">Set "Class Teacher Of" in profile first.</div>`;else{const stu=getStudentsForClass(ct);h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><p style="font-size:14px;font-weight:600;color:var(--primary)">${ct} (${stu.length})</p><button id="addStu" class="btn" style="padding:10px;border-radius:14px">${icons.plus}</button></div><div id="addStuForm" style="display:none;margin-bottom:12px"></div>`;
h+=stu.map(s=>`<div class="glass-l" style="padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px"><div style="width:36px;height:36px;border-radius:12px;background:hsla(190,90%,50%,.12);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);font-size:12px">${s.roll_no||"#"}</div><div style="flex:1"><p style="font-size:14px;font-weight:600">${s.name}</p><p style="font-size:11px;color:var(--muted-fg)">Att: ${getAttendancePct(s).toFixed(0)}%</p></div><button data-del="${s.id}" style="padding:6px;background:none;border:none;cursor:pointer;color:var(--muted-fg)">${icons.trash}</button></div>`).join("")}}
h+="</div>";el.innerHTML=h;
bindSubTabs(el);
el.querySelectorAll("[data-stab]").forEach(b=>b.onclick=()=>{studentSubTab=b.dataset.stab;renderContent()});
if(studentSubTab==="class"&&isCT){const ab=document.getElementById("addStu");if(ab)ab.onclick=()=>{const f=document.getElementById("addStuForm");f.style.display="block";
f.innerHTML=`<div class="glass-l" style="padding:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><input id="nsN" placeholder="Full Name" style="grid-column:1/3"/><input id="nsR" placeholder="Roll No"/><input id="nsD" type="date" placeholder="DOB"/><input id="nsP" placeholder="Performance" style="grid-column:1/3"/><input id="nsL" type="number" placeholder="Last Year %" min="0" max="100"/><input id="nsRm" placeholder="Remarks"/></div><div style="display:flex;gap:8px"><button id="cAdd" class="btn" style="flex:1;padding:10px;font-size:14px">Add</button><button id="xAdd" class="btn-g" style="padding:10px">${icons.x}</button></div></div>`;
document.getElementById("xAdd").onclick=()=>f.style.display="none";
document.getElementById("cAdd").onclick=()=>{const n=document.getElementById("nsN").value.trim();if(!n)return;const s={id:Date.now().toString(),name:n,class:ct.replace(/[A-Za-z]/g,""),section:ct.replace(/[0-9]/g,"")||"A",roll_no:document.getElementById("nsR").value.trim(),dob:document.getElementById("nsD").value,performance:document.getElementById("nsP").value.trim(),last_year_percentage:document.getElementById("nsL").value||"",remarks:document.getElementById("nsRm").value.trim(),attendance:{}};db.ref("classStudents/"+ct+"/"+s.id).set(s);f.style.display="none"}};
el.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm("Delete?"))db.ref("classStudents/"+ct+"/"+b.dataset.del).remove()})}}

if(!sc){el.innerHTML=`<div class="fade-in"><h2 style="font-size:20px;font-weight:700;margin-bottom:12px">Attendance</h2>${renderSubTabs()}<p style="text-align:center;color:var(--muted-fg);padding:32px 0">Set "Class Teacher Of" in profile first.</p></div>`;bindSubTabs(el);return}

let h=`<div class="fade-in"><h2 style="font-size:20px;font-weight:700;margin-bottom:12px">Attendance</h2>${renderSubTabs()}<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center"><p style="font-size:14px;font-weight:600;color:var(--primary);flex:1">${sc}</p><input id="ad" type="date" value="${sd}" style="flex:1"/></div>`;

try{

  const availClasses=getAllClasses().join(", ");
  const t=await callGemini(`Extract the timetable from this image. The available days are: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday. The available class names are: ${availClasses}. Periods are numbered 1-8. Return a JSON array where each entry has: {"day": "Monday", "period": 1, "subject": "Math", "className": "5A"}. Match class names to the available ones listed. Only return valid JSON array, no extra text.`,b64,f.type);
  let parsed = t.replace(/```json?\n?/g,"").replace(/```/g,"").trim();
  const j=JSON.parse(parsed);
  if(!Array.isArray(j)||!j.length){throw new Error("No entries found");}
  let added=0;
  for(const e of j){
    if(!e.day||!e.period||!e.subject)continue;

}catch(e){
  console.error("Timetable scan error:",e);
  m.innerHTML=`<div class="alert-u" style="padding:12px;font-size:14px">Failed to parse timetable. Try a clearer image.</div>`;
  setTimeout(()=>m.style.display="none",3000);
}};

document.getElementById("qpGenerate")?.addEventListener("click",async()=>{
  showQpMsg("Generating question paper...",true);
  const prompt=`You are an expert teacher creating a question paper. Based on the following content, generate a well-structured question paper. Use markdown formatting with **bold** for section headers, proper numbering, and clear structure.

CONTENT:
${qpText.slice(0,15000)}

REQUIREMENTS:
- Subject: ${qpConfig.subject||"As per content"}, Class: ${qpConfig.className||"As per content"}
- Difficulty: ${qpConfig.difficulty}
- MCQs: ${qpConfig.mcqs}, Short Answer (2-3 marks): ${qpConfig.shortAnswer}, Long Answer (5 marks): ${qpConfig.longAnswer}
- Fill in Blanks: ${qpConfig.fillBlanks}, True/False: ${qpConfig.trueFalse}
- Total Marks: ${qpConfig.totalMarks}, Time: ${qpConfig.timeAllowed}
${qpConfig.instructions?`- Instructions: ${qpConfig.instructions}`:""}

FORMAT: Use markdown. Bold section headers like **SECTION A: Multiple Choice Questions**. Number all questions. Include marks for each question. End with **ANSWER KEY** section.`;
  try{const t=await callGemini(prompt);
    if(t){
      qpPaper=t;showQpMsg("✅ Generated!");
      const qpId=Date.now().toString();
      db.ref("questionPapers/"+currentUser.uid+"/"+qpId).set({id:qpId,paper:t,subject:qpConfig.subject,className:qpConfig.className,difficulty:qpConfig.difficulty,totalMarks:qpConfig.totalMarks,createdAt:new Date().toISOString(),createdBy:currentUser.email});
      renderQPaper(el);
    }else showQpMsg("Failed to generate.");
  }catch{showQpMsg("Generation failed.");}

document.getElementById("qpDlPdf")?.addEventListener("click",()=>{
  if(!qpPaper)return;
  const{jsPDF}=window.jspdf;const doc=new jsPDF();const pw=doc.internal.pageSize.getWidth();const ph=doc.internal.pageSize.getHeight();
  doc.setFillColor(0,150,200);doc.rect(0,0,pw,35,"F");
  doc.setFontSize(18);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
  doc.text(qpConfig.subject||"Question Paper",pw/2,16,{align:"center"});
  doc.setFontSize(10);doc.setFont("helvetica","normal");
  let subLine=[];
  if(qpConfig.className)subLine.push("Class: "+qpConfig.className);
  subLine.push("Time: "+qpConfig.timeAllowed);
  subLine.push("Max Marks: "+qpConfig.totalMarks);
  doc.text(subLine.join("  |  "),pw/2,26,{align:"center"});
  doc.setTextColor(0,0,0);
  const lines=qpPaper.split("\n");let y=45;
  for(const line of lines){
    if(y>ph-20){doc.addPage();y=20;}
    const trimmed=line.replace(/\*\*/g,"").replace(/^#+\s*/,"").trim();
    const isBold=line.includes("**")||/^#{1,3}\s/.test(line)||/^SECTION|^ANSWER KEY/i.test(trimmed);
    const isSection=/^SECTION|^ANSWER KEY/i.test(trimmed);
    if(isSection){
      y+=4;
      doc.setFillColor(240,248,255);doc.roundedRect(15,y-5,pw-30,10,2,2,"F");
      doc.setFont("helvetica","bold");doc.setFontSize(11);doc.setTextColor(0,100,150);
      doc.text(trimmed,20,y+2);
      doc.setTextColor(0,0,0);y+=14;
    }else if(isBold){
      doc.setFont("helvetica","bold");doc.setFontSize(10);
      const wrapped=doc.splitTextToSize(trimmed,pw-40);
      for(const wl of wrapped){if(y>ph-20){doc.addPage();y=20;}doc.text(wl,20,y);y+=5}
      doc.setFont("helvetica","normal");
    }else if(trimmed===""){
      y+=3;
    }else{
      doc.setFont("helvetica","normal");doc.setFontSize(10);
      const wrapped=doc.splitTextToSize(trimmed,pw-40);
      for(const wl of wrapped){if(y>ph-20){doc.addPage();y=20;}doc.text(wl,20,y);y+=5}
    }
  }
  const pc=doc.internal.getNumberOfPages();
  for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text(`Page ${i}/${pc}`,pw/2,ph-8,{align:"center"});doc.text(`Generated by TeachMate`,pw-20,ph-8,{align:"right"})}
  doc.save(`Question_Paper_${qpConfig.subject||"Paper"}.pdf`);
})}

// ===== CHART FUNCTIONS =====
let classChart=null,studentChart=null;
function drawClassChart(canvasId,students){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  if(classChart){classChart.destroy();classChart=null;}
  const labels=students.map(s=>s.name.split(' ')[0]);
  const data=students.map(s=>parseFloat(getAvg(s.id).toFixed(1)));
  const colors=data.map(v=>v>=70?'hsla(142,70%,45%,0.7)':v>=40?'hsla(38,92%,50%,0.7)':'hsla(0,84%,60%,0.7)');
  const avg=data.length?data.reduce((a,b)=>a+b,0)/data.length:0;
  classChart=new Chart(canvas,{type:'bar',data:{labels,datasets:[
    {label:'Avg Score %',data,backgroundColor:colors,borderRadius:6,barPercentage:0.7},
    {label:'Class Avg',data:data.map(()=>avg),type:'line',borderColor:'hsla(190,90%,50%,0.8)',borderWidth:2,borderDash:[5,5],pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{family:'Rajdhani'}}}},scales:{
    x:{ticks:{color:'#94a3b8',font:{family:'Rajdhani',size:10},maxRotation:45},grid:{display:false}},
    y:{beginAtZero:true,max:100,ticks:{color:'#94a3b8',font:{family:'Rajdhani'}},grid:{color:'hsla(210,40%,96%,0.06)'}}
  }}});
}
function drawStudentChart(canvasId,tests){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  if(studentChart){studentChart.destroy();studentChart=null;}
  if(!tests||!tests.length)return;
  const labels=tests.map((t,i)=>t.name||'Test '+(i+1));
  const data=tests.map(t=>t.maxScore>0?parseFloat(((t.score/t.maxScore)*100).toFixed(1)):0);
  const avg=data.length?data.reduce((a,b)=>a+b,0)/data.length:0;
  studentChart=new Chart(canvas,{type:'line',data:{labels,datasets:[
    {label:'Score %',data,borderColor:'hsl(190,90%,50%)',backgroundColor:'hsla(190,90%,50%,0.15)',fill:true,tension:0.3,pointBackgroundColor:'hsl(190,90%,50%)',pointRadius:5},
    {label:'Average',data:data.map(()=>avg),borderColor:'hsla(260,60%,55%,0.6)',borderWidth:2,borderDash:[5,5],pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{family:'Rajdhani'}}}},scales:{
    x:{ticks:{color:'#94a3b8',font:{family:'Rajdhani',size:11}},grid:{display:false}},
    y:{beginAtZero:true,max:100,ticks:{color:'#94a3b8',font:{family:'Rajdhani'}},grid:{color:'hsla(210,40%,96%,0.06)'}}
  }}});
}

function renderMarks(el){
  const admin=isAdmin(currentUser.email);
  const ct=userProfile.classTeacherOf;
  // Non-admin: only show their class
  let sc=ct&&ct!=="None"?ct:getAllClasses()[0]||"";
  const availableClasses=admin?getAllClasses():(ct&&ct!=="None"?[ct]:[]);

function render(){const stu=getStudentsForClass(sc);
let h=`<div class="fade-in"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:20px;font-weight:700">Marks</h2>${availableClasses.length>1?`<select id="mc" style="padding:6px 10px;font-size:12px">${availableClasses.map(c=>`<option value="${c}" ${c===sc?"selected":""}>${c}</option>`).join("")}</select>`:`<span style="font-size:14px;font-weight:600;color:var(--primary)">${sc||"No class"}</span>`}</div>${renderSubTabs()}`;
if(!sc||!availableClasses.length){h+=`<p style="text-align:center;color:var(--muted-fg);padding:48px 0">${admin?"No classes available":"Set 'Class Teacher Of' in profile first."}</p></div>`;el.innerHTML=h;bindSubTabs(el);return}
if(!stu.length){h+=`<p style="text-align:center;color:var(--muted-fg);padding:48px 0">No students</p></div>`;el.innerHTML=h;bindSubTabs(el);if(document.getElementById("mc"))document.getElementById("mc").onchange=e=>{sc=e.target.value;render()};return}
const avg=stu.reduce((a,s)=>a+getAvg(s.id),0)/stu.length;h+=`<p style="font-size:12px;color:var(--muted-fg);margin-bottom:12px">Avg: ${avg.toFixed(1)}%</p>`;
h+=stu.map(s=>{const a=getAvg(s.id);return`<div class="glass-l" style="padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px"><span style="flex:1;font-size:14px;font-weight:600">${s.name}</span><span style="font-size:12px;font-weight:600">${a.toFixed(0)}%</span><div style="width:60px"><div class="bar"><div class="bar-fill" style="width:${a}%;background:${a>=70?"var(--success)":a>=40?"var(--warning)":"var(--destructive)"}"></div></div></div></div>`}).join("");
h+="</div>";el.innerHTML=h;bindSubTabs(el);if(document.getElementById("mc"))document.getElementById("mc").onchange=e=>{sc=e.target.value;render()}}

// ===== REPORTS (whole class + individual, % per test) =====
function renderReports(el){
  const admin=isAdmin(currentUser.email);
  const ct=userProfile.classTeacherOf;
  let sc=ct&&ct!=="None"?ct:getAllClasses()[0]||"";
  const availableClasses=admin?getAllClasses():(ct&&ct!=="None"?[ct]:[]);
  let reportView="class"; // "class" or "individual"
  let selectedStudentId=null;

function render(){const stu=getStudentsForClass(sc);
let h=`<div class="fade-in"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div><h2 style="font-size:20px;font-weight:700">Reports</h2></div><div style="display:flex;gap:8px;align-items:center">${availableClasses.length>1?`<select id="rc" style="padding:6px 10px;font-size:12px">${availableClasses.map(c=>`<option value="${c}" ${c===sc?"selected":""}>${c}</option>`).join("")}</select>`:`<span style="font-size:13px;font-weight:600;color:var(--primary)">${sc||"No class"}</span>`}${stu.length?`<button id="dlAll" class="btn" style="padding:8px 12px;font-size:12px;border-radius:14px">${icons.download} PDF</button>`:""}</div></div>${renderSubTabs()}`;

// View toggle: Class / Individual
h+=`<div style="display:flex;gap:8px;margin-bottom:16px"><button data-rv="class" class="sub-tab ${reportView==="class"?"sub-tab-act":"glass-l"}" style="flex:1">📊 Whole Class</button><button data-rv="individual" class="sub-tab ${reportView==="individual"?"sub-tab-act":"glass-l"}" style="flex:1">👤 Individual</button></div>`;

if(!sc||!availableClasses.length){h+=`<p style="text-align:center;color:var(--muted-fg);padding:48px 0">${admin?"No classes":"Set 'Class Teacher Of' in profile first."}</p></div>`;el.innerHTML=h;bindSubTabs(el);return}
if(!stu.length){h+=`<p style="text-align:center;color:var(--muted-fg);padding:48px 0">No students</p></div>`;el.innerHTML=h;bindSubTabs(el);if(document.getElementById("rc"))document.getElementById("rc").onchange=e=>{sc=e.target.value;render()};return}

if(reportView==="class"){
  // Class average chart
  h+=`<div class="glass-l" style="padding:16px;margin-bottom:16px"><p style="font-size:14px;font-weight:600;margin-bottom:8px">📊 Class Performance</p><div class="chart-container"><canvas id="classChartCanvas"></canvas></div></div>`;
  // Whole class view
  h+=stu.map(s=>{const r=getReport(s.id),avg=getAvg(s.id),tag=getTag(avg,r.disciplineGrade);
  return`<div class="glass-l" style="padding:12px;margin-bottom:8px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:600;cursor:pointer;color:var(--primary)" data-viewstu="${s.id}">${s.name}</span><span style="font-size:11px;${tag.c}">${tag.e} ${tag.l}</span></div><span style="font-size:12px;font-weight:600">${avg.toFixed(0)}%</span></div>
  <div style="display:flex;gap:6px;margin-bottom:8px"><div style="flex:1"><p style="font-size:10px;color:var(--muted-fg)">Discipline</p><select data-rfield="disciplineGrade" data-sid="${s.id}" style="width:100%;padding:4px;font-size:12px">${DISCIPLINE_GRADES.map(g=>`<option ${r.disciplineGrade===g?"selected":""}>${g}</option>`).join("")}</select></div><div style="flex:1"><p style="font-size:10px;color:var(--muted-fg)">Att.</p><p style="font-size:12px;font-weight:600">${getAttendancePct(s).toFixed(0)}%</p></div></div>
  <div style="display:flex;gap:6px"><input data-tname="${s.id}" placeholder="Test name" style="flex:1;padding:6px;font-size:12px"/><input data-tscore="${s.id}" type="number" placeholder="Score" style="width:50px;padding:6px;font-size:12px"/><input data-tmax="${s.id}" type="number" placeholder="Max" style="width:50px;padding:6px;font-size:12px"/><button data-addtest="${s.id}" class="btn" style="padding:6px 10px;font-size:11px;border-radius:8px">+</button></div>
  ${r.tests&&r.tests.length?`<div style="margin-top:6px">${r.tests.map((t,i)=>{const pct=t.maxScore>0?((t.score/t.maxScore)*100).toFixed(0):0;return`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted-fg);margin-top:4px"><span style="flex:1">${t.name||"Test "+(i+1)}</span><span>${t.score}/${t.maxScore} (${pct}%)</span><button data-rmtest="${s.id}" data-ti="${i}" style="background:none;border:none;color:var(--destructive);cursor:pointer;font-size:10px">✕</button></div>`}).join("")}</div>`:""}</div>`}).join("");
} else {
  // Individual student view
  if(!selectedStudentId){
    h+=`<p style="font-size:13px;color:var(--muted-fg);margin-bottom:12px">Select a student:</p>`;
    h+=stu.map(s=>{const avg=getAvg(s.id);const tag=getTag(avg,getReport(s.id).disciplineGrade);
      return`<div class="glass-l" style="padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer" data-viewstu="${s.id}"><div style="width:36px;height:36px;border-radius:12px;background:hsla(190,90%,50%,.12);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);font-size:12px">${s.roll_no||"#"}</div><div style="flex:1"><p style="font-size:14px;font-weight:600">${s.name}</p><p style="font-size:11px;color:var(--muted-fg)">${tag.e} ${tag.l} · ${avg.toFixed(0)}%</p></div>${icons.arrow}</div>`}).join("");
  } else {
    const s=stu.find(st=>st.id===selectedStudentId);
    if(!s){selectedStudentId=null;render();return}
    const r=getReport(s.id),avg=getAvg(s.id),tag=getTag(avg,r.disciplineGrade);
    h+=`<div style="display:flex;gap:8px;margin-bottom:16px"><button data-back="1" class="btn-g" style="padding:8px 16px;font-size:13px;border-radius:12px;display:flex;align-items:center;gap:6px">← Back to list</button><button id="dlStudent" class="btn" style="padding:8px 16px;font-size:13px;border-radius:12px;display:flex;align-items:center;gap:6px">${icons.download} PDF Report</button></div>`;
    h+=`<div class="glass-l" style="padding:20px;margin-bottom:16px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:48px;height:48px;border-radius:16px;background:hsla(190,90%,50%,.12);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);font-size:16px">${s.roll_no||"#"}</div><div><p style="font-size:18px;font-weight:700">${s.name}</p><p style="font-size:12px;color:var(--muted-fg)">${sc} · ${tag.e} ${tag.l}</p></div></div>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px"><div style="text-align:center"><p style="font-size:20px;font-weight:700;color:${avg>=70?"var(--success)":avg>=40?"var(--warning)":"var(--destructive)"}">${avg.toFixed(1)}%</p><p style="font-size:10px;color:var(--muted-fg)">Avg Score</p></div><div style="text-align:center"><p style="font-size:20px;font-weight:700">${getAttendancePct(s).toFixed(0)}%</p><p style="font-size:10px;color:var(--muted-fg)">Attendance</p></div><div style="text-align:center"><p style="font-size:20px;font-weight:700">${r.disciplineGrade||"B1"}</p><p style="font-size:10px;color:var(--muted-fg)">Discipline</p></div></div>`;
    // Discipline selector
    h+=`<div style="margin-bottom:12px"><p style="font-size:11px;color:var(--muted-fg);margin-bottom:4px">Change Discipline Grade</p><select data-rfield="disciplineGrade" data-sid="${s.id}" style="width:100%;padding:6px;font-size:12px">${DISCIPLINE_GRADES.map(g=>`<option ${r.disciplineGrade===g?"selected":""}>${g}</option>`).join("")}</select></div>`;
    // Add test
    h+=`<div style="display:flex;gap:6px;margin-bottom:12px"><input data-tname="${s.id}" placeholder="Test name" style="flex:1;padding:8px;font-size:13px"/><input data-tscore="${s.id}" type="number" placeholder="Score" style="width:60px;padding:8px;font-size:13px"/><input data-tmax="${s.id}" type="number" placeholder="Max" style="width:60px;padding:8px;font-size:13px"/><button data-addtest="${s.id}" class="btn" style="padding:8px 12px;font-size:12px;border-radius:10px">+</button></div>`;
    // Tests list with percentage
    if(r.tests&&r.tests.length){
      h+=`<div class="chart-container" style="margin-bottom:16px"><canvas id="studentChartCanvas"></canvas></div><p style="font-size:13px;font-weight:600;margin-bottom:8px">Test Results</p>`;
      h+=r.tests.map((t,i)=>{const pct=t.maxScore>0?((t.score/t.maxScore)*100).toFixed(0):0;const pclr=pct>=70?"var(--success)":pct>=40?"var(--warning)":"var(--destructive)";
        return`<div class="glass" style="padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="flex:1"><p style="font-size:13px;font-weight:600">${t.name||"Test "+(i+1)}</p></div><span style="font-size:13px;font-weight:500">${t.score}/${t.maxScore}</span><span style="font-size:13px;font-weight:700;color:${pclr};min-width:40px;text-align:right">${pct}%</span><button data-rmtest="${s.id}" data-ti="${i}" style="background:none;border:none;color:var(--destructive);cursor:pointer;font-size:12px;padding:2px">✕</button></div>`}).join("");
    } else {
      h+=`<p style="text-align:center;color:var(--muted-fg);padding:16px 0;font-size:13px">No tests recorded yet</p>`;
    }
    h+=`</div>`;
  }
}

h+="</div>";el.innerHTML=h;bindSubTabs(el);
// Draw charts after DOM update
setTimeout(()=>{
  if(reportView==="class"&&stu.length)drawClassChart("classChartCanvas",stu);
  if(reportView==="individual"&&selectedStudentId){const sr=getReport(selectedStudentId);if(sr.tests&&sr.tests.length)drawStudentChart("studentChartCanvas",sr.tests);}
},100);
if(document.getElementById("rc"))document.getElementById("rc").onchange=e=>{sc=e.target.value;selectedStudentId=null;render()};
el.querySelectorAll("[data-rv]").forEach(b=>b.onclick=()=>{reportView=b.dataset.rv;selectedStudentId=null;render()});
el.querySelectorAll("[data-viewstu]").forEach(b=>b.onclick=()=>{reportView="individual";selectedStudentId=b.dataset.viewstu;render()});
el.querySelectorAll("[data-back]").forEach(b=>b.onclick=()=>{selectedStudentId=null;render()});
// Individual student PDF
document.getElementById("dlStudent")?.addEventListener("click",()=>{
  const s=stu.find(st=>st.id===selectedStudentId);if(!s)return;
  const r=getReport(s.id),avg=getAvg(s.id),tag=getTag(avg,r.disciplineGrade),att=getAttendancePct(s).toFixed(0);
  const{jsPDF}=window.jspdf;const doc=new jsPDF();const pw=doc.internal.pageSize.getWidth();
  // Header
  doc.setFillColor(0,150,200);doc.rect(0,0,pw,40,"F");
  doc.setFontSize(20);doc.setFont("helvetica","bold");doc.setTextColor(255);
  doc.text("Student Report",pw/2,18,{align:"center"});
  doc.setFontSize(12);doc.setFont("helvetica","normal");
  doc.text(s.name+" | "+sc+" | Roll: "+(s.roll_no||"N/A"),pw/2,30,{align:"center"});
  doc.setTextColor(0);
  // Summary
  doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("Summary",20,55);
  doc.setFontSize(11);doc.setFont("helvetica","normal");
  doc.text("Average Score: "+avg.toFixed(1)+"%",20,65);
  doc.text("Attendance: "+att+"%",20,73);
  doc.text("Discipline Grade: "+(r.disciplineGrade||"B1"),20,81);
  doc.text("Status: "+tag.l,20,89);
  // Test results table
  if(r.tests&&r.tests.length){
    doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("Test Results",20,105);
    const tbody=r.tests.map((t,i)=>{
      const pct=t.maxScore>0?((t.score/t.maxScore)*100).toFixed(1):0;
      return[t.name||"Test "+(i+1),t.score+"",t.maxScore+"",pct+"%"];
    });
    // Add average row
    tbody.push(["AVERAGE","","",avg.toFixed(1)+"%"]);
    doc.autoTable({startY:110,head:[["Test","Score","Max","Percentage"]],body:tbody,theme:"grid",
      headStyles:{fillColor:[0,150,200],textColor:255,fontStyle:"bold"},
      foot:[],didParseCell:function(data){if(data.row.index===tbody.length-1){data.cell.styles.fontStyle="bold";data.cell.styles.fillColor=[230,245,255]}}
    });
  }
  const pc=doc.internal.getNumberOfPages();
  for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text("Generated by TeachMate",pw-20,doc.internal.pageSize.getHeight()-8,{align:"right"})}
  doc.save("Report_"+s.name.replace(/\s+/g,"_")+".pdf");
});
el.querySelectorAll("[data-rfield]").forEach(sel=>sel.onchange=()=>{const sid=sel.dataset.sid;const r=getReport(sid);r[sel.dataset.rfield]=sel.value;db.ref("studentReports/"+sid).set(r)});
el.querySelectorAll("[data-addtest]").forEach(b=>b.onclick=()=>{const sid=b.dataset.addtest;const name=el.querySelector(`[data-tname="${sid}"]`).value.trim()||"Test";const score=Number(el.querySelector(`[data-tscore="${sid}"]`).value)||0;const maxScore=Number(el.querySelector(`[data-tmax="${sid}"]`).value)||100;const r=getReport(sid);if(!r.tests)r.tests=[];r.tests.push({name,score,maxScore});db.ref("studentReports/"+sid).set(r)});
el.querySelectorAll("[data-rmtest]").forEach(b=>b.onclick=()=>{const sid=b.dataset.rmtest,ti=parseInt(b.dataset.ti);const r=getReport(sid);r.tests.splice(ti,1);db.ref("studentReports/"+sid).set(r)});
document.getElementById("dlAll")?.addEventListener("click",()=>{
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(18);doc.setFont("helvetica","bold");doc.text(`Student Reports - ${sc}`,105,20,{align:"center"});
  const body=stu.map(s=>{const r=getReport(s.id),avg=getAvg(s.id),tag=getTag(avg,r.disciplineGrade);
    const tests=r.tests?r.tests.map(t=>`${t.name}: ${t.score}/${t.maxScore} (${t.maxScore>0?((t.score/t.maxScore)*100).toFixed(0):0}%)`).join(", "):"No tests";
    return[s.name,avg.toFixed(0)+"%",r.disciplineGrade,getAttendancePct(s).toFixed(0)+"%",tag.l,tests]});
  doc.autoTable({startY:30,head:[["Name","Avg %","Discipline","Attendance","Status","Tests"]],body,theme:"grid",headStyles:{fillColor:[0,150,200],textColor:255,fontStyle:"bold"},columnStyles:{5:{cellWidth:50,fontSize:7}}});
  doc.save(`Reports_${sc}.pdf`)
})}
render()}

// ===== NEXUS AI (with student data access) =====
function renderAI(el){
  // Build student context for AI
  let studentContext = "";
  const ct = userProfile.classTeacherOf;
  if(ct && ct !== "None") {
    const stu = getStudentsForClass(ct);
    if(stu.length) {
      studentContext = `\n\nYou have access to the following student data for class ${ct}:\n`;
      studentContext += stu.map(s => {
        const r = getReport(s.id);
        const avg = getAvg(s.id);
        const att = getAttendancePct(s).toFixed(0);
        const tag = getTag(avg, r.disciplineGrade);
        const tests = r.tests ? r.tests.map(t => `${t.name}: ${t.score}/${t.maxScore} (${t.maxScore>0?((t.score/t.maxScore)*100).toFixed(0):0}%)`).join(", ") : "No tests";
        return `- ${s.name} (Roll: ${s.roll_no||"N/A"}): Avg=${avg.toFixed(0)}%, Attendance=${att}%, Discipline=${r.disciplineGrade||"B1"}, Status=${tag.l}, Tests=[${tests}]`;
      }).join("\n");
    }
  }
  // Also add current period class data
  const currentClass = getCurrentPeriodClass();
  if(currentClass && currentClass !== ct) {
    const stu2 = getStudentsForClass(currentClass);
    if(stu2.length) {
      studentContext += `\n\nCurrent period class ${currentClass} students:\n`;
      studentContext += stu2.map(s => {
        const avg = getAvg(s.id);
        const att = getAttendancePct(s).toFixed(0);
        const tag = getTag(avg, getReport(s.id).disciplineGrade);
        return `- ${s.name}: Avg=${avg.toFixed(0)}%, Att=${att}%, ${tag.l}`;
      }).join("\n");
    }
  }

  el.innerHTML=`<div style="display:flex;flex-direction:column;height:calc(100vh - 220px)"><div style="text-align:center;margin-bottom:12px"><h2 style="font-size:20px;font-weight:700" class="grad-text">Nexus AI</h2><p style="font-size:12px;color:var(--muted-fg)">Ask about students, get insights, or teaching help</p></div><div id="aiC" style="flex:1;overflow-y:auto" class="no-scroll"></div><div style="display:flex;gap:8px;padding-top:8px"><input id="aiI" placeholder="Ask anything about your students..." style="flex:1;padding:12px 16px;border-radius:14px"/><button id="aiS" class="btn" style="padding:12px;border-radius:14px">${icons.send}</button></div></div>`;
  renderAIMsgs();
  const send=async()=>{const inp=document.getElementById("aiI"),txt=inp.value.trim();if(!txt||aiLoad)return;aiMsgs.push({id:Date.now().toString(),role:"user",text:txt});inp.value="";aiLoad=true;renderAIMsgs();
  try{
    const systemPrompt = `You are Nexus AI, a friendly and insightful teaching assistant for TeachMate app. Be concise and practical. Use markdown formatting with **bold**, *italic*, bullet points, and code blocks where appropriate.

When asked about students, analyze their data and provide actionable insights. You can identify:
- Students who need attention (low scores, poor attendance)
- Top performers
- Attendance patterns
- Areas for improvement
- Suggestions for class management${studentContext}`;
    
    const hist=aiMsgs.filter(m=>m.id!=="w").map(m=>({role:m.role==="user"?"user":"model",parts:[{text:m.text}]}));
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+GEMINI_KEY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:systemPrompt}]},contents:hist})});
    const d=await res.json();
    aiMsgs.push({id:(Date.now()+1).toString(),role:"ai",text:d?.candidates?.[0]?.content?.parts?.[0]?.text||"Sorry, try again."});
  }catch(e){aiMsgs.push({id:(Date.now()+1).toString(),role:"ai",text:"Error. Try again."})}
  aiLoad=false;renderAIMsgs()};
  document.getElementById("aiS").onclick=send;document.getElementById("aiI").onkeydown=e=>{if(e.key==="Enter")send()}}

function renderAIMsgs(){const c=document.getElementById("aiC");if(!c)return;
c.innerHTML=aiMsgs.map(m=>`<div style="display:flex;gap:8px;margin-bottom:12px;${m.role==="user"?"justify-content:flex-end":""}">
${m.role==="ai"?`<div style="width:28px;height:28px;border-radius:10px;background:hsla(190,90%,50%,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px"><span style="color:var(--primary)">${icons.bot}</span></div>`:""}
<div style="max-width:80%;padding:12px;border-radius:18px;font-size:14px;line-height:1.5;${m.role==="user"?"background:linear-gradient(135deg,hsl(190,90%,50%),hsl(200,90%,45%));color:var(--primary-fg);border-bottom-right-radius:4px":"background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-bottom-left-radius:4px"}"><div class="md-content">${m.role==="ai"?renderMd(m.text):m.text}</div></div>
${m.role==="user"?`<div style="width:28px;height:28px;border-radius:10px;background:hsla(280,70%,60%,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px"><span style="color:var(--accent)">${icons.user}</span></div>`:""}
</div>`).join("")+(aiLoad?`<div style="display:flex;gap:8px"><div style="width:28px;height:28px;border-radius:10px;background:hsla(190,90%,50%,.15);display:flex;align-items:center;justify-content:center"><span style="color:var(--primary)">${icons.bot}</span></div><div class="glass-l" style="padding:12px;border-radius:18px;border-bottom-left-radius:4px"><span class="dot"></span> <span class="dot" style="animation-delay:150ms"></span> <span class="dot" style="animation-delay:300ms"></span></div></div>`:"");
c.scrollTop=c.scrollHeight}

</script>
